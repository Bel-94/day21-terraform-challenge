# Day 21 — Infrastructure Code Deployment Workflow CI
# Runs on every PR to main and every push to main.
#
# PR jobs  (no AWS needed):
#   1. lint     — terraform fmt --check + terraform validate
#   2. unit     — terraform test (plan-only, no real resources)
#
# Post-merge job (requires AWS):
#   3. integration — full Terratest suite against real AWS

name: Terraform Infrastructure Workflow

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:

  # ── Job 1: Lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint (fmt + validate)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: terraform fmt check
        run: terraform fmt -check -recursive
        working-directory: webserver-cluster

      - name: terraform init (for validate)
        run: terraform init -backend=false
        working-directory: webserver-cluster

      - name: terraform validate
        run: terraform validate
        working-directory: webserver-cluster

  # ── Job 2: Unit Tests ────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (terraform test)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: terraform init
        run: terraform init -backend=false
        working-directory: webserver-cluster

      - name: terraform test
        run: terraform test
        working-directory: webserver-cluster


